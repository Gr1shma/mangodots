set -g default-terminal "tmux-256color"
set -as terminal-overrides ',foot*:Tc'
set -s escape-time 0

unbind C-b

set-option -g prefix C-b
set-option -g detach-on-destroy off

bind-key C-b send-prefix
set -g status-style 'bg=#333333 fg=#5eacd3'
set -g base-index 1

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy && wl-paste | cliphist store'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1
bind b break-pane -d

bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/dox/todo.md"
bind -r N neww -c "#{pane_current_path}" "~/.local/bin/search_notes"

# forget the find window.  That is for chumps
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"
bind-key -r i run-shell "tmux neww tmux-cht.sh"
bind-key g run-shell "~/.local/bin/tmux-git-open"

# Status bar configuration
set -g status-left-length 30
set -g status-right-length 50
