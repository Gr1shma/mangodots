[general]
default_module = "g"
empty_module = "a"
exec_cmd = "zsh -c"
vi_mode = true
esc_to_abort = true
cheatsheet_entry = "?"
cheatsheet_viewer = "less -R; clear"
clear_screen_after_execution = false
loop_mode = false
external_editor = ""

[interface]
header = """
 \u001B[34;1m  >\u001B[0m $USER@$(echo $HOST)       
    \u001B[34;1m>\u001B[0;1m """
header_cmd = "cat ~/.cache/wal/sequences 2>/dev/null"
header_cmd_trimmed_lines = 0
header_concatenate = false
list_prefix = "      "
selection_prefix = "    \u001B[31;1m> "
place_holder = ""
default_module_message = "      \u001B[33msearch\u001B[0m the internet"
empty_module_message = ""
suggestion_mode = "list"
suggestion_lines = 12
indicator_with_arg_module = "\u001B[31m^\u001B[0m "
indicator_no_arg_module = "\u001B[31m$\u001B[0m "
prefix_padding = 3
prefix_color = "\u001B[33m"
description_color = "\u001B[39m"
place_holder_color = "\u001B[30m"
hint_color = "\u001B[30m"
move_right = 0
move_up = 0

[[modules]]
description = "search with google"
prefix = "g"
cmd = "xdg-open 'https://google.com/search?q={}'"
with_argument = true
url_encode = true

[[modules]]
description = "search youtube"
prefix = "yt"
cmd = "xdg-open 'https://www.youtube.com/search?q={}'"
with_argument = true
url_encode = true

[[modules]]
description = "search youtube music"
prefix = "ym"
cmd = "xdg-open 'https://music.youtube.com/search?q={}'"
with_argument = true
url_encode = true

[[modules]]
description = "kill a running app"
prefix = "k"
cmd = 'ps -u "$USER" -o comm= | sort -u | fsel --dmenu | xargs -r pkill -9'
with_argument = false

[[modules]]
description = "launch apps with fsel"
prefix = "app"
cmd = "fsel -vv -r -d -ss \"{}\""
with_argument = true

[[modules]]
description = "launch apps instantly"
prefix = "a"
cmd = "fsel -vv -r -d -p {}"
with_argument = true

[[modules]]
description = "manage clipboard with fsel"
prefix = "cl"
cmd = "fsel --cclip"
with_argument = false

[[modules]]
description = "install pkgs"
prefix = "i"
cmd = "sudo xbps-install -Sy {}"
with_argument = true

[[modules]]
description = "search notes"
prefix = "n"
cmd = "search_notes"
with_argument = false

[[modules]]
description = "bookmarks"
prefix = "bm"
cmd = "bookmark"
with_argument = false

[[modules]]
description = "queue playlist"
prefix = "ml"
cmd = "find ~/music/playlists -name '*.m3u' -o -name '*.pls' | sed 's|.*/||;s|\\.[^.]*$||' | fzf --reverse --no-scrollbar --padding 1,3 --prompt 'Playlist: ' | xargs -I{} mpc load {}"
with_argument = false

[[modules]]
description = "search and play song"
prefix = "ms"
cmd = "mpc-search"
with_argument = false

[[modules]]
description = "play/pause"
prefix = "pp"
cmd = "mpc toggle"
with_argument = false

[[modules]]
description = "next track"
prefix = "mn"
cmd = "mpc next"
with_argument = false

[[modules]]
description = "prev track"
prefix = "mp"
cmd = "mpc prev"
with_argument = false
