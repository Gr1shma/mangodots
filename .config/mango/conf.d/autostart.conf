# autostart
exec-once=/home/grishma/.local/bin/start-protocol
exec-once = killall pipewire; pipewire
exec-once=swayidle -w timeout 300 'mmsg -d disable_monitor,eDP-1; mmsg -d disable_monitor,HDMI-A-1' resume 'mmsg -d enable_monitor,eDP-1; mmsg -d enable_monitor,HDMI-A-1'
exec-once=syncthing & awww-daemon --quiet & eww daemon && eww open bar
exec-once=foot --server
exec-once=sleep 1 && mangostyle
exec-once=cclipd -s 2 -t "image/png" -t "image/*" -t "text/plain;charset=utf-8" -t "text/*" -t "*"
exec-once = ~/.local/bin/brightness-restore
exec-once = ~/.local/bin/profile-auto

exec=gsettings set org.gnome.desktop.interface gtk-theme "Breeze-Dark"
exec=gsettings set org.gnome.desktop.interface icon-theme "breeze-dark"
exec=gsettings set org.gnome.desktop.interface cursor-theme "Adwaita"
exec=gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
