# keybindings

# terminal/menu/file manager
bind=SUPER,Return,spawn,footclient
bind=SUPER,space,spawn,footclient --app-id otter-launcher -T foot zsh -c 'source ~/.config/zsh/.zshrc; otter-launcher'
bind=SUPER,e,spawn,footclient -T foot zsh -c 'source ~/.config/zsh/.zshrc; yazi'

# keyboard layout switch
bind=SUPER+SHIFT,p,switch_keyboard_layout

# app and helper scripts
bind=SUPER,w,spawn,mangostyle
bind=SUPER+SHIFT,w,spawn,footclient --app-id floating-term --title big-size -e wallselect
bind=SUPER+SHIFT,a,spawn,footclient --app-id floating-term -e emoji -c
bind=SUPER+SHIFT,f,spawn,footclient --app-id floating-term --title big-size -e fs
bind=SUPER,b,spawn,footclient --app-id floating-term zsh -c 'source ~/.config/zsh/.zshrc; bookmark'
bind=SUPER,p,spawn,footclient --app-id floating-term -e power_menu
bind=SUPER,n,spawn,footclient --app-id floating-term -e search_notes

# session/window controls
bind=SUPER,c,killclient,
bind=SUPER+SHIFT,q,quit
bind=SUPER,v,togglefloating,

# eww bar reload
bind=SUPER,g,spawn,bash -lc 'eww kill; sleep 0.3; setsid eww open bar >/dev/null 2>&1 &'

# workspace/tag navigation
bind=SUPER,Tab,viewtoleft_have_client,0
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# move active window to tag and follow it
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

# focus movement (hjkl)
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# move/swap windows (hjkl)
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down

# resize
bind=SUPER+CTRL,k,resizewin,+30,+0
bind=SUPER+CTRL,j,resizewin,-30,+0

# screenshots (wayfreeze)
bind=SUPER,Print,spawn,/home/grishma/.local/bin/screenshot output
bind=NONE,Print,spawn,/home/grishma/.local/bin/screenshot region
bind=SUPER+SHIFT,Print,spawn,/home/grishma/.local/bin/screenshot region-clipboard
bind=CTRL+SHIFT,s,spawn,/home/grishma/.local/bin/screenshot region-clipboard

# audio
bind=NONE,XF86AudioRaiseVolume,spawn,pamixer -i 5
bind=NONE,XF86AudioLowerVolume,spawn,pamixer -d 5
bind=NONE,XF86AudioMute,spawn,pamixer -t
bind=SHIFT,XF86AudioRaiseVolume,spawn,pamixer --default-source --increase 2
bind=SHIFT,XF86AudioLowerVolume,spawn,pamixer --default-source --decrease 2
bind=SHIFT,XF86AudioMute,spawn,pamixer --default-source -t

# brightness
bind=NONE,XF86MonBrightnessUp,spawn,brightness-set 10%+
bind=NONE,XF86MonBrightnessDown,spawn,brightness-set 10%-

# mouse bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# wheel workspace switch
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
